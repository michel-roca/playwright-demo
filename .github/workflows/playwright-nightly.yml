name: Playwright - Nachtelijk

on:
  schedule:
    - cron: '17 2 * * *'
      timezone: 'Europe/Amsterdam'

permissions:
  contents: read

concurrency:
  group: aluminiumvakman-production-smoke-tests
  cancel-in-progress: false

jobs:
  test:
    name: ALUMINIUMvakman smoke tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v5

      - name: Node.js installeren
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: NPM dependencies installeren
        run: npm ci

      - name: TypeScript controleren
        run: npx tsc -p tsconfig.json --noEmit

      - name: Playwright browsers installeren
        run: npx playwright install --with-deps

      - name: Playwright-tests uitvoeren
        run: npx playwright test

      - name: Playwright-rapport uploaden
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-nightly-${{ github.run_id }}-${{ github.run_attempt }}
          path: playwright-report/
          retention-days: 30